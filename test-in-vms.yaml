---
- name: Test devops collection roles
  hosts: vms
  gather_facts: false

  vars:
    incus_image: images:debian/13/cloud
    vm_memory: 2GiB
    vm_disk: 20GiB

  pre_tasks:
    - name: Ensure local incus VM is available
      delegate_to: localhost
      become: false
      community.general.lxd_container:
        url: unix:/var/lib/incus/unix.socket
        name: "{{ inventory_hostname }}"
        state: started
        source:
          type: image
          mode: pull
          server: https://images.linuxcontainers.org
          protocol: simplestreams
          alias: debian/13/cloud
        type: virtual-machine
        config:
          limits.memory: "{{ vm_memory }}"
        devices:
          root:
            path: /
            pool: default
            type: disk
            size: "{{ vm_disk }}"
        wait_for_container: true
        wait_for_ipv4_addresses: true
        timeout: 300

    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

- name: Test devops collection roles
  hosts: vms
  roles:
    - common

- name: Test knot nameserver role
  hosts: knot_nameservers
  become: true
  roles:
    - knot_nameserver

- name: Test deploy roles
  hosts: setup_deploy
  become: true
  roles:
    - setup_deploy
    - test_deploy_ohai
    - test_deploy_fail

- name: Test devbox roles
  hosts: devboxes
  become: true
  roles:
    - role: ttyd
      vars:
        ttyd_with_usr_local_bin_symlink: true
