---

- include: setup_Debian.yml

- name: enable modules
  apache2_module:
    name: "{{item}}"
    state: present
  with_items:
    - php7.0
    - rewrite
    - ssl

- name: default vhost
  template:
    src: default-vhost.j2
    dest: /etc/apache2/sites-available/000-default.conf
  notify: reload apache
