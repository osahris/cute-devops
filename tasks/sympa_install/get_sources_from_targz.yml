- name: Check Sympa tar.gz existence
  stat: path="{{ install_prefix }}/{{ sympa_install_dir_name }}/src/{{ source_dir }}.tar.gz"
  register: sympa_archive_file

- name: Download Sympa tar.gz
  get_url:
    url: "{{ sympa_source }}/{{ sympa_version }}/sympa-{{ sympa_version }}.tar.gz"
    dest: "{{ install_prefix }}/{{ sympa_install_dir_name }}/src"
    sha256sum: "{{ sympa_sha256[sympa_version] }}"
  when: not sympa_archive_file.stat.exists

- name: Create the Sympa src directory
  file: path={{ install_prefix }}/{{ sympa_install_dir_name }}/src/{{ source_dir }} state=directory
  
- name: Unpack the tarball
  unarchive: src={{ install_prefix }}/{{ sympa_install_dir_name }}/src/{{ source_dir }}.tar.gz dest={{ install_prefix }}/{{ sympa_install_dir_name }}/src/ copy=no creates={{ install_prefix }}/{{ sympa_install_dir_name }}/src/{{ source_dir }}/README

- name: Apply Sympa patches
  patch:
    src: "{{ item }}"
    basedir: "{{ install_prefix }}/{{ sympa_install_dir_name }}/src/{{ source_dir }}"
    strip: 1
  when: sympa_apply_patches
  with_fileglob: "{{ role_path }}/patches/{{ sympa_version }}/*.diff"

