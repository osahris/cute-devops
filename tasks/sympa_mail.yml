---
- name: Install list aliases file
  copy:
    src: files/list_aliases.tt2
    dest: "{{ sympa_config_directory }}/list_aliases.tt2"
    owner: sympa
    group: sympa
    mode: 0644

- name: Creating Sympa aliases file (1/2)
  file:
    path: "{{ sympa_mail_alias_file }}"
    state: touch
    owner: sympa
    group: sympa
    mode: 0644

- name: Creating Sympa aliases file (2/2)
  file:
    path: "{{ sympa_mail_alias_file }}.db"
    state: touch
    owner: sympa
    group: sympa
    mode: 0644

- name: Compiling sympa_aliases
  command: "postmap {{ sympa_mail_alias_file }}"

- name: Adding list domains as virtual domains
  template:
    src: mail/domains.sympa.j2
    dest: /etc/postfix/domains.sympa

- name: Compiling Sympa domains
  command: postmap /etc/postfix/domains.sympa

- name: Adding required generic aliases
  template:
    src: mail/virtual.sympa.j2
    dest: /etc/postfix/virtual.sympa

- name: Compiling Sympa transport
  command: postmap /etc/postfix/virtual.sympa

- name: Adding required generic transports
  template:
    src: mail/transport.sympa.j2
    dest: /etc/postfix/transport.sympa

- name: Compiling Sympa transport
  command: postmap /etc/postfix/transport.sympa
