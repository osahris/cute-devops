---
- name: Deploy gitflower as a bare git repo with treehouses layout
  hosts: localhost
  connection: local
  become: true
  gather_facts: false
  vars:
    repos:
      - name: gitflower
        path: /srv/repos/gitflower.git
        group: devops
        owner: root
        description: "gitflower — a git-based development platform (FastAPI + click). https://cute-devops.patterns.how"
  roles:
    - role: repos
