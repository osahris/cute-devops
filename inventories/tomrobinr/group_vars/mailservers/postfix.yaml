postfix_with_postfixadmin: false
mailname: tomrobinr.iodatalabs.dev

certificate_provider: letsencrypt
postfix_with_ssl: true

postfix_with_submission_service: true
postfix_with_smtps_service: true

postfix_virtual_mailbox_domains:
  - tomrobinr.iodatalabs.dev
dovecot_auth: passwdfile

admin_email: "email@tomraja.de"

# postfix_certificate_fullchain_file: /etc/letsencrypt/live/{{mailname}}/fullchain.pem
# postfix_certificate_private_key_file: /etc/letsencrypt/live/{{mailname}}/privkey.pem

postfix_certificate_fullchain_file: /etc/ssl/certs/{{mailname}}.cert.pem
postfix_certificate_private_key_file: /etc/ssl/private/{{mailname}}.key.pem

# dkim_cname_domains:
#   third.iodatalabs.dev: tomrobinr.iodatalabs.dev
#   lists.another.iodatalabs.dev: tomrobinr.iodatalabs.dev

postfix_virtual_mailbox_maps: |
  {
    "postmaster@{{ mailname }}": "{{ mailname }}/postmaster",
    "accounts@{{ mailname }}": "{{ mailname }}/accounts",
    "support@{{ mailname }}": "{{ mailname }}/support"
  }