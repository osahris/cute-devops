postfix_with_sympa: true

sympa_admin_email: "{{ admin_email | default('listmaster@'+mailname) }}"
sympa_listmaster_emails:
  - "{{ sympa_admin_email }}"
  - postmaster@{{ mailname }}
  
sympa_domains:
  # - lists.another.iodatalabs.dev
  # - third.iodatalabs.dev
  - lists.tomrobinr.iodatalabs.dev
sympa_main_domain: lists.{{ mailname }}

sympa_gather_facts_from:
  - dev.numhub.de
  - staging.numhub.de

