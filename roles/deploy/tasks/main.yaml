---
- name: Validate deploy instance ID format
  ansible.builtin.assert:
    that:
      - deploy_id is defined
      - deploy_id is match('^[a-z0-9.-]+$')
      - deploy_id | length <= 128
    fail_msg: "deploy_id must contain only lowercase letters, numbers, dots, and hyphens (max 128 characters)"

- name: Directory for deploy instance {{ deploy_id }}
  ansible.builtin.file:
    path: "{{ deploy_folder_path }}"
    state: directory
    mode: "0755"

- name: Template environment config for deploy instance {{ deploy_id }}
  ansible.builtin.template:
    src: deploy.env.j2 # Note that the template here is intentionally missing because we want it to be taken from the calling role
    dest: "{{ deploy_folder_path }}/deploy.env"
    mode: "0644"
