---
- name: Configure resolvconf
  when: resolvconf_enabled
  block:
    - name: Resolvconf debian package
      ansible.builtin.apt:
        pkg: resolvconf

    - name: Link resolv.conf
      ansible.builtin.file:
        src: /run/resolvconf/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
