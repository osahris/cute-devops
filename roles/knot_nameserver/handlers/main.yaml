---

- name: Reload knot
  ansible.builtin.service:
    name: knot
    state: reloaded
  listen: reload nameserver

- name: Restart knot
  ansible.builtin.service:
    name: knot
    state: restarted

- name: Check zones
  ansible.builtin.command: kzonecheck {{ item.domain }}
  loop: "{{ nameserver_zones }}"
  changed_when: false
