---

- name: Check zonefiles
  ansible.builtin.command: kzonecheck -v "{{ knot_nameserver_zonefile_directory }}/{{ zone.domain }}.zone"
  loop: "{{ nameserver_zones }}"
  loop_control:
    loop_var: zone
    label: "{{ zone.domain }}"
  changed_when: false
