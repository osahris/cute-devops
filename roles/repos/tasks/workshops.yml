---
- name: "Create workshops/ directory (3775: setgid + sticky + group write) under {{ _repo_path }}"
  ansible.builtin.file:
    path: "{{ _repo_path }}/workshops"
    state: directory
    owner: "{{ _repo_owner }}"
    group: "{{ _repo_group }}"
    mode: "3775"

- name: "Scaffold initial README.md under {{ _repo_path }}"
  ansible.builtin.template:
    src: README.md.j2
    dest: "{{ _repo_path }}/README.md"
    owner: "{{ _repo_owner }}"
    group: "{{ _repo_group }}"
    mode: "0644"
    force: false

- name: "Symlink CLAUDE.md -> README.md in {{ _repo_path }}"
  ansible.builtin.file:
    src: README.md
    dest: "{{ _repo_path }}/CLAUDE.md"
    state: link
    owner: "{{ _repo_owner }}"
    group: "{{ _repo_group }}"
    force: true

- name: "Strip group-write on policy paths under {{ _repo_path }}"
  ansible.builtin.command:
    cmd: "chmod -R g-w {{ _repo_path }}/{{ item }}"
  loop:
    - hooks
    - config
    - description
    - README.md
  changed_when: false

- name: "Set up Claude hooks under {{ _repo_path }}"
  ansible.builtin.include_tasks: claude_hooks.yml
  when: _repo_claude | bool
