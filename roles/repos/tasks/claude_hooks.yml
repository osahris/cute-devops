---
- name: "Ensure .claude/hooks/ subdirectory exists in {{ _repo_path }}"
  ansible.builtin.file:
    path: "{{ _repo_path }}/.claude/hooks"
    state: directory
    owner: "{{ _repo_owner }}"
    group: "{{ _repo_group }}"
    mode: "0755"

- name: "Scaffold .claude/settings.json in {{ _repo_path }}"
  ansible.builtin.template:
    src: claude/settings.json.j2
    dest: "{{ _repo_path }}/.claude/settings.json"
    owner: "{{ _repo_owner }}"
    group: "{{ _repo_group }}"
    mode: "0644"
    force: false

- name: "Scaffold WorktreeCreate hook in {{ _repo_path }}"
  ansible.builtin.template:
    src: claude/worktree-create.sh.j2
    dest: "{{ _repo_path }}/.claude/hooks/worktree-create"
    owner: "{{ _repo_owner }}"
    group: "{{ _repo_group }}"
    mode: "0755"
    force: false

- name: "Scaffold WorktreeRemove hook in {{ _repo_path }}"
  ansible.builtin.template:
    src: claude/worktree-remove.sh.j2
    dest: "{{ _repo_path }}/.claude/hooks/worktree-remove"
    owner: "{{ _repo_owner }}"
    group: "{{ _repo_group }}"
    mode: "0755"
    force: false
