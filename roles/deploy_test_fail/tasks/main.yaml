---
- name: Include deploy instance role
  ansible.builtin.include_role:
    role: deploy_instance
  vars:
    deploy_instance_id: "{{ deploy_test_fail_instance_id }}"

- name: Template init script for deploy instance {{ deploy_test_fail_instance_id }}
  ansible.builtin.template:
    src: 01-test-fail-init.j2
    dest: "/etc/deploy/{{ deploy_test_fail_instance_id }}/01-test-fail-init"
    mode: "0755"

- name: Template deploy script for deploy instance {{ deploy_test_fail_instance_id }}
  ansible.builtin.template:
    src: 02-test-fail.j2
    dest: "/etc/deploy/{{ deploy_test_fail_instance_id }}/02-test-fail"
    mode: "0755"
