---
- name: Install zsh
  ansible.builtin.apt:
    name: zsh
    state: present

- name: Zsh config directory
  ansible.builtin.file:
    path: /etc/zsh/zshrc.d
    state: directory
    mode: "0755"

- name: Source zshrc.d from zshrc
  ansible.builtin.blockinfile:
    path: /etc/zsh/zshrc
    marker: "# {mark} ANSIBLE MANAGED - source zshrc.d"
    block: |
      if [ -d /etc/zsh/zshrc.d ]; then
        for f in /etc/zsh/zshrc.d/*.zsh; do
          [ -r "$f" ] && source "$f"
        done
      fi

- name: Zsh powerline-go prompt
  ansible.builtin.copy:
    src: powerline-go.zsh
    dest: /etc/zsh/zshrc.d/powerline-go.zsh
    mode: "0644"
