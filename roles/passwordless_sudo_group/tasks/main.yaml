---
- name: Add passwordless sudo group
  ansible.builtin.include_tasks: add.yaml
  when: passwordless_sudo_group_enable

- name: Remove passwordless sudo group
  ansible.builtin.include_tasks: remove.yaml
  when: not passwordless_sudo_group_enable
