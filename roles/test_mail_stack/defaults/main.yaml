---
# systemd units that must be active on this instance.
test_mail_stack_expected_units:
  - postfix

# TCP ports that must be listening on this instance (probed inside it).
test_mail_stack_expected_ports:
  - 25

# Run the end-to-end delivery probe (test-mail-flow.sh). Enable on the
# instance that owns the mailboxes; it injects a message and checks it
# is retrievable over IMAP.
test_mail_stack_flow: false

# Parameters for the end-to-end probe.
test_mail_stack_flow_smtp_host: localhost
test_mail_stack_flow_imap_host: localhost
test_mail_stack_flow_user: test@mail.test
test_mail_stack_flow_password: testpassword
