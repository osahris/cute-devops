# Parse the rendered JSON array into a real list; the extensions template
# does `| join(', ')` on it, which would otherwise iterate the string's
# characters (e.g. `[`, `"`, `C`, `A`, …).
certificate_basic_constraints: "{{ lookup('template','basic_constraints.json.j2') | from_yaml }}"
