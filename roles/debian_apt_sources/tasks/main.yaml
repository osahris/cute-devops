---
- name: Assert running Debian bookworm or trixie
  ansible.builtin.assert:
    that:
      - ansible_distribution == 'Debian'
      - ansible_distribution_release in ['bookworm', 'trixie']
    fail_msg: "This role requires Debian bookworm or trixie, but found {{ ansible_distribution }} {{ ansible_distribution_release }}"
    success_msg: "Running Debian {{ ansible_distribution_release }}"

- name: Debian sources (deb822 format)
  ansible.builtin.template:
    src: debian.sources.j2
    dest: /etc/apt/sources.list.d/debian.sources
    mode: "0644"

- name: Remove legacy sources.list
  ansible.builtin.file:
    path: /etc/apt/sources.list
    state: absent

- name: Required debian packages
  ansible.builtin.apt:
    pkg: python3-apt
    state: present

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
