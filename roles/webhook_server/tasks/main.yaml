---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - webhook
      - python3-passlib
      - apache2-utils
    state: present
    update_cache: true

- name: Create webhook group
  ansible.builtin.group:
    name: "{{ webhook_server_group }}"
    system: true
    state: present

- name: Create webhook user
  ansible.builtin.user:
    name: "{{ webhook_server_user }}"
    group: "{{ webhook_server_group }}"
    home: "{{ webhook_server_home }}"
    shell: /bin/bash
    system: true
    create_home: true
    state: present

- name: Create webhook directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ webhook_server_user }}"
    group: "{{ webhook_server_group }}"
    mode: "0755"
  loop:
    - "{{ webhook_server_config_dir }}"
    - "{{ webhook_server_log_dir }}"

- name: Configure sudo for webhook user to run deploy command
  ansible.builtin.copy:
    content: |
      # Allow webhook user to run deploy command without password
      {{ webhook_server_user }} ALL=(root) NOPASSWD: /usr/local/bin/deploy
    dest: /etc/sudoers.d/webhook-deploy
    mode: "0440"
    validate: "visudo -cf %s"

- name: Create htpasswd file for webhook authentication
  community.general.htpasswd:
    path: "{{ webhook_server_config_dir }}/.htpasswd"
    name: "{{ webhook_server_auth_user }}"
    password: "{{ webhook_server_auth_password }}"
    owner: "{{ webhook_server_user }}"
    group: "{{ webhook_server_group }}"
    mode: "0640"

- name: Create webhook configuration
  ansible.builtin.template:
    src: hooks.json.j2
    dest: "{{ webhook_server_config_file }}"
    owner: "{{ webhook_server_user }}"
    group: "{{ webhook_server_group }}"
    mode: "0644"
  notify: restart webhook

- name: Create webhook systemd service override
  ansible.builtin.template:
    src: webhook.service.j2
    dest: /etc/systemd/system/webhook.service
    mode: "0644"
  notify:
    - reload systemd
    - restart webhook

- name: Ensure webhook service is enabled and started
  ansible.builtin.systemd:
    name: webhook
    enabled: true
    state: started
    daemon_reload: true
