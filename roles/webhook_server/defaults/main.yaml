---
webhook_server_user: webhook
webhook_server_group: webhook
webhook_server_home: /var/lib/webhook
webhook_server_config_dir: /etc/webhook
webhook_server_config_file: "{{ webhook_server_config_dir }}/hooks.json"
webhook_server_port: 9000
webhook_server_listen_address: "0.0.0.0"
webhook_server_auth_user: deploy
webhook_server_auth_password: "{{ vault_webhook_server_auth_password | default('changeme') }}"
webhook_server_log_file: /var/log/webhook/webhook.log
webhook_server_log_dir: /var/log/webhook
