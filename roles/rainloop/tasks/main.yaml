--- 

- name: install rainloop debian package
  apt:
    pkg: rainloop

- name: template rainloop localhost config
  template:
    src: localhost.ini.j2
    dest: /etc/rainloop/domains/localhost.ini

# RainLoop treats a domain whose .ini is a symlink to another domain's
# .ini as an alias reusing that config. Point each local domain at the
# templated localhost.ini. The link is relative so it stays valid
# regardless of the domains directory's absolute path.
- name: link local mail domains that should be usable by rainloop
  file:
    state: link
    src: localhost.ini
    dest: /etc/rainloop/domains/{{item}}.ini
  loop: "{{ rainloop_local_domains }}"
