---
- name: Install locales package
  ansible.builtin.apt:
    name: "{{ locales_with_all | ternary('locales-all', 'locales') }}"
    state: present

- name: Ensure a locale exists
  community.general.locale_gen:
    name: "{{ item }}"
    state: present
  loop: "{{ locales_gen }}"

- name: Configure /etc/locale.conf
  ansible.builtin.template:
    src: default_locale.j2
    dest: /etc/locale.conf
    mode: "0644"

- name: Configure /etc/default/locale
  ansible.builtin.template:
    src: default_locale.j2
    dest: /etc/default/locale
    mode: "0644"
