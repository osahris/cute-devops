---
- name: "Assert vhost name is systemd-safe for {{ _vhost_name }}"
  ansible.builtin.assert:
    that:
      - _vhost_name is match('^[a-z0-9.-]+$')
      - _vhost_name | length <= 253       # RFC 1035 FQDN max
    fail_msg: >-
      vhost.name must match ^[a-z0-9.-]+$ (FQDN form, max 253 chars);
      got '{{ _vhost_name }}'

- name: "Ensure the Unix user exists for vhost {{ _vhost_name }}"
  ansible.builtin.user:
    name: "{{ _vhost_name }}"
    home: "{{ _vhost_dir }}"
    shell: /usr/sbin/nologin
    create_home: true
    state: present
  register: _vhost_user

- name: "Ensure vhost directory ownership and group-share for {{ _vhost_name }}"
  ansible.builtin.file:
    path: "{{ _vhost_dir }}"
    state: directory
    owner: "{{ _vhost_name }}"
    group: "{{ _vhost_pushers_group }}"
    mode: "2775"

- name: "Enable lingering (= auto-start user@.service at boot) for {{ _vhost_name }}"
  ansible.builtin.command: "loginctl enable-linger {{ _vhost_name }}"
  args:
    creates: "/var/lib/systemd/linger/{{ _vhost_name }}"

- name: "Make sure user@.service is running now for {{ _vhost_name }}"
  ansible.builtin.systemd_service:
    name: "user@{{ _vhost_user.uid }}.service"
    state: started

- name: "Initialise the vhost git tree on the deployment branch for {{ _vhost_name }}"
  become: true
  become_user: "{{ _vhost_name }}"
  ansible.builtin.shell:  # noqa: command-instead-of-module
    executable: /bin/bash
    chdir: "{{ _vhost_dir }}"
    creates: "{{ _vhost_dir }}/.git"
    cmd: |
      set -euo pipefail
      git init -q -b deployment .
      git -c user.email=vhost@local -c user.name=vhost commit -q --allow-empty -m "initial"
      git branch deploy deployment
      printf "%s\n" ".env" >> .git/info/exclude
      mkdir -p deploy

- name: "Group-share the git tree with the pushers for {{ _vhost_name }}"
  ansible.builtin.shell:  # noqa: command-instead-of-module
    executable: /bin/bash
    cmd: |
      set -eu
      chgrp -R "{{ _vhost_pushers_group }}" "{{ _vhost_dir }}/.git"
      find "{{ _vhost_dir }}/.git" -type d -exec chmod g+rwxs {} +
      find "{{ _vhost_dir }}/.git/objects" \
           "{{ _vhost_dir }}/.git/refs" \
           "{{ _vhost_dir }}/.git/logs" \
           -type f -exec chmod g+rw {} + 2>/dev/null || true
  changed_when: false

- name: "Install the standard post-receive hook in {{ _vhost_name }}"
  ansible.builtin.template:
    src: post-receive.j2
    dest: "{{ _vhost_dir }}/.git/hooks/post-receive"
    owner: "{{ _vhost_name }}"
    group: "{{ _vhost_pushers_group }}"
    mode: "0755"
