---

- name: install bash
  ansible.builtin.apt:
    name: bash
    state: present

- name: bash powerline-go prompt
  ansible.builtin.copy:
    src: powerline-go.sh
    dest: /etc/profile.d/powerline-go.sh
    mode: "0644"
