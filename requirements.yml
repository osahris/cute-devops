# Collections the roles and test harnesses depend on. galaxy.yml's
# `dependencies` only auto-install when this collection is itself
# installed; this file lets a working checkout pull them directly with
# `ansible-galaxy collection install -r requirements.yml`.
---
collections:
  - name: community.general
    version: ">=8.0.0"
  - name: containers.podman
    version: ">=1.13.0"
