---
# mx: inbound mail exchange. Accepts mail, verifies DKIM/DMARC, and hands
# mailbox mail to the mailboxes instance (mb) over LMTP on the network.
postfix_virtual_transport: lmtp:inet:mb:24
postfix_with_sympa: false
# see the single-server mail.yaml note: milters are out of scope for the
# transport-flow test (need DNS; opendkim socket sandbox issue on trixie).
postfix_with_opendkim: false
postfix_with_opendmarc: false

# mx accepts mail for the local virtual-mailbox domain and hands it to mb.
postfix_virtual_mailbox_domains:
  - "{{ mailserver_domain_name }}"

# assertions
test_mail_stack_expected_units:
  - postfix
test_mail_stack_expected_ports:
  - 25
test_mail_stack_flow: false
